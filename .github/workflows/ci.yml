name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app tests run.py

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy PyQt6 types-requests ftfy requests
      # The Qt-free layers are kept strictly mypy-clean. The mixin layer is duck-typed
      # by design (see the [[tool.mypy.overrides]] note in pyproject.toml) and is covered
      # by ruff + the test suite instead.
      - run: mypy app/core app/services app/audio app/hotkeys app/ui

  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The test suite intentionally targets the Qt-free layers, so it needs neither
      # PyQt6 nor an audio stack — it runs on bare CI runners.
      - run: pip install pytest ftfy requests "audioop-lts; python_version >= '3.13'"
      - run: pytest
