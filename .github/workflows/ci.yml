name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Allows the release workflow to run the full CI suite as a gate before publishing.
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app tests run.py

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install mypy PyQt6 types-requests ftfy requests
      # The Qt-free layers are kept strictly mypy-clean. The mixin layer is duck-typed
      # by design (see the [[tool.mypy.overrides]] note in pyproject.toml) and is covered
      # by ruff + the test suite instead.
      - run: mypy app/core app/services app/audio app/hotkeys app/ui

  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      # Keep the broad OS/Python matrix lightweight. The Qt-backed clipboard regression
      # suite runs once in the dedicated Windows job below.
      - run: pip install pytest ftfy requests "audioop-lts; python_version >= '3.13'"
      - run: pytest --ignore=tests/test_clipboard.py

  clipboard-test:
    name: Clipboard tests (Windows, py3.12)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # ClipboardMixin imports the application's input backends as well as Qt. Install
      # exactly that dependency slice instead of the full audio/application stack.
      - run: pip install pytest PyQt6 copykitten pynput pyautogui
      - run: pytest tests/test_clipboard.py
